<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="Organize your life with a task manager app built using JavaScript and Bootstrap."
    />
    <title>Task Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script type="module" src="task-manager.js"></script>
  </head>
  <body style="background-color: #f8f9fa">
    <header class="py-4 bg-dark text-light text-center">
      <h1 class="display-1">Task Manager</h1>
      <p class="fw-light">Stay organized and productive</p>
    </header>

    <main class="container py-4">
      <div class="py-3 d-flex justify-content-center gap-2 flex-wrap">
        <input
          type="text"
          placeholder="Enter Task"
          id="task-name"
          class="form-control w-auto py-2"
        />
        <button id="btn" class="btn btn-primary">Add Task</button>
      </div>
      <div class="py-3 d-flex justify-content-center">
        <ul id="task-list" class="list-group col-10 col-md-6 shadow-sm"></ul>
      </div>
    </main>
  </body>
</html>
