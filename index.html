<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="A task manager app to organize your life"
    />
    <title>Task Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script type="module" src="task-manager.js"></script>
  </head>
  <body>
    <header class="container">
      <h1 class="display-1">Task Manager</h1>
    </header>

    <main class="container">
      <div class="py-3">
        <input type="text" placeholder="Enter Task" id="task-name" />
        <button id="btn">Add Task</button>
      </div>
      <div class="py-3">
        <ul id="task-list" class="list-group col-md-6"></ul>
      </div>
    </main>
  </body>
</html>
